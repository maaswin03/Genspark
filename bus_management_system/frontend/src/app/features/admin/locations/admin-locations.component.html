<section class="admin-page">
  <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap mb-3">
    <div>
      <h2 class="h4 fw-bold mb-1">Locations</h2>
      <p class="text-secondary mb-0">Manage source and destination locations.</p>
    </div>
    <button class="btn btn-danger" type="button" (click)="openAddModal()">Add Location</button>
  </div>

  <div *ngIf="message" class="alert" [class.alert-success]="messageTone === 'success'" [class.alert-danger]="messageTone === 'danger'">
    {{ message }}
  </div>

  <div class="toolbar mb-3">
    <input
      class="form-control"
      type="search"
      [(ngModel)]="searchTerm"
      (ngModelChange)="applyFilter()"
      placeholder="Search by location or city"
      aria-label="Search locations"
    />
  </div>

  <div *ngIf="isLoading" class="alert alert-light border d-flex align-items-center gap-2 mb-3">
    <div class="spinner-border spinner-border-sm text-danger" role="status" aria-label="Loading locations"></div>
    <span>Loading locations...</span>
  </div>

  <app-admin-table-shell>
    <thead>
      <tr>
        <th>Name</th>
        <th>City</th>
        <th>State</th>
        <th>Used In Count</th>
        <th class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let location of filteredLocations">
        <td class="fw-semibold">{{ location.name }}</td>
        <td>{{ location.city }}</td>
        <td>{{ location.state }}</td>
        <td>{{ location.usedInCount ?? 0 }}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-primary" type="button" (click)="openEditModal(location)">Edit</button>
        </td>
      </tr>
      <tr *ngIf="!isLoading && filteredLocations.length === 0">
        <td colspan="6" class="text-center text-secondary py-4">No locations found.</td>
      </tr>
    </tbody>
  </app-admin-table-shell>
</section>

<app-admin-modal
  [open]="isModalOpen"
  [title]="editingLocationId ? 'Edit Location' : 'Add Location'"
  subtitle="Provide location details"
  (closed)="closeModal()"
>
  <form [formGroup]="locationForm" (ngSubmit)="submitLocation()" novalidate>
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Name</label>
        <input class="form-control" type="text" formControlName="name" placeholder="Location name" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">City</label>
        <input class="form-control" type="text" formControlName="city" placeholder="City" />
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">State</label>
        <input class="form-control" type="text" formControlName="state" placeholder="State" />
      </div>
    </div>

    <div class="text-danger small mt-2" *ngIf="locationForm.invalid && (locationForm.touched || locationForm.dirty)">
      Name, city, and state are required.
    </div>

    <div class="d-flex justify-content-end gap-2 mt-3">
      <button class="btn btn-outline-secondary" type="button" (click)="closeModal()" [disabled]="isSaving">Cancel</button>
      <button class="btn btn-danger" type="submit" [disabled]="isSaving">
        <span *ngIf="!isSaving">{{ editingLocationId ? 'Update' : 'Add' }}</span>
        <span *ngIf="isSaving" class="d-inline-flex align-items-center gap-2">
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          Saving...
        </span>
      </button>
    </div>
  </form>
</app-admin-modal>
