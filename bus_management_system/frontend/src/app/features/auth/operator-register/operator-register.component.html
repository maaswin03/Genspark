<main class="auth-page">
  <div class="auth-shell container py-4 py-lg-5">
    <div class="auth-card shadow-lg">
      <section class="brand-panel">
        <div class="brand-content">
          <p class="brand-tag">Partner with BusMate</p>
          <h1>Grow your routes with confidence</h1>
          <p class="brand-text">Submit your operator profile and documents to start listing your buses on our platform.</p>
        </div>
      </section>

      <section class="form-panel">
        <div class="form-wrap">
          <h2 class="h3 fw-bold mb-2">Operator registration</h2>
          <p class="text-secondary mb-4">Submit your details for review.</p>

          <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Name</label>
                <input class="form-control" formControlName="name" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <input class="form-control" type="email" formControlName="email" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Phone</label>
                <input class="form-control" formControlName="phone" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Password</label>
                <input class="form-control" type="password" formControlName="password" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Company name</label>
                <input class="form-control" formControlName="companyName" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">License number</label>
                <input class="form-control" formControlName="licenseNumber" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Document type</label>
                <select class="form-select" formControlName="documentType">
                  <option *ngFor="let type of documentTypes" [value]="type.value">{{ type.label }}</option>
                </select>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Upload document</label>
                <input class="form-control" type="file" (change)="onFileSelected($event)" />
              </div>
            </div>

            <div *ngIf="successMessage" class="alert alert-success py-2 mt-3">{{ successMessage }}</div>
            <div *ngIf="errorMessage" class="alert alert-danger py-2 mt-3">{{ errorMessage }}</div>

            <button class="btn btn-danger w-100 mt-3" type="submit" [disabled]="isSubmitting">
              <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>
              {{ isSubmitting ? 'Submitting...' : 'Submit operator application' }}
            </button>

            <a routerLink="/auth/login" class="btn btn-link w-100 mt-2">Back to login</a>
          </form>
        </div>
      </section>
    </div>
  </div>
</main>
